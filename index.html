<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Informasi Absensi Digital KPU Sergai</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f6f9;
        }
        iframe {
            border: none; width: 100%; height: 100%; display: block;
        }
    </style>
</head>
<body>

    <!-- Atribut 'allow' di bawah ini adalah standar industri untuk meloloskan sensor GPS & Kamera dalam iframe -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbx_Rx7BSOrLtEFOHQ8vStGp8Q4n344M-P5O16t6Y68TfUv4oPnR-2SV7v8iYluatM5OXQ/exec" 
        allow="geolocation *; camera *; microphone *;"
        sandbox="allow-forms allow-pointer-lock allow-popups allow-same-origin allow-scripts allow-top-navigation">
    </iframe>

</body>
</html>
